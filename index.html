<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍻 超嗨隨機喝酒遊戲 🍻</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ff2e63;
            text-shadow: 0 0 10px #ff2e63;
        }

        .subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .player-input {
            margin-bottom: 25px;
        }

        .player-input label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }

        #players {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            outline: none;
        }

        #players::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .result-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px 20px;
            margin: 25px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #ff2e63;
        }

        #result {
            font-size: 24px;
            font-weight: bold;
            color: #ffd166;
            text-shadow: 0 0 8px #ffd166;
        }

        #tip {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.7;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 14px 10px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            background: #ff2e63;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 46, 99, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 46, 99, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .reset-btn {
            background: #00b4d8;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍻 超嗨隨機喝酒遊戲 🍻</h1>
        <p class="subtitle">派對必備！誰喝、喝多少、怎麼喝，全交給命運～</p>

        <div class="player-input">
            <label>請輸入玩家名字（用「,」逗號隔開）：</label>
            <input type="text" id="players" placeholder="例如：小明,小美,阿強,小花" value="小明,小美,阿強,小花">
        </div>

        <div class="result-box">
            <div id="result">點按按鈕開始遊戲</div>
            <div id="tip"></div>
        </div>

        <div class="btn-group">
            <button onclick="randomPerson()">隨機抽人</button>
            <button onclick="randomDrink()">喝酒指令</button>
            <button onclick="randomCount()">喝幾杯</button>
            <button class="reset-btn" onclick="reset()">重新開始</button>
        </div>
    </div>

    <script>
        // 喝酒懲罰清單
        const drinkRules = [
            "自罰一杯",
            "跟左邊的人碰杯一起喝",
            "跟右邊的人碰杯一起喝",
            "指定一位朋友陪你喝",
            "全場一起喝",
            "男生全喝",
            "女生全喝",
            "玩手機的人喝一杯",
            "最後一個到的人喝",
            "笑最大聲的人喝",
            "連喝兩杯",
            "隨機找一人猜拳，輸的喝",
            "講一個笑話，不好笑就喝"
        ];

        // 隨機抽人
        function randomPerson() {
            const playerList = getPlayerList();
            if (playerList.length === 0) {
                showResult("⚠️ 請先輸入玩家名字！");
                return;
            }
            const lucky = playerList[Math.floor(Math.random() * playerList.length)];
            showResult(`🍺 幸運得主：${lucky}`, "趕快準備喝酒～");
        }

        // 隨機喝酒指令
        function randomDrink() {
            const rule = drinkRules[Math.floor(Math.random() * drinkRules.length)];
            showResult(`🥳 指令：${rule}`);
        }

        // 隨機幾杯
        function randomCount() {
            const count = Math.floor(Math.random() * 5) + 1;
            showResult(`🍷 喝 ${count} 杯！`, "乾啦～");
        }

        // 取得玩家清單
        function getPlayerList() {
            const input = document.getElementById("players").value.trim();
            return input ? input.split(",").map(name => name.trim()) : [];
        }

        // 顯示結果
        function showResult(text, tip = "") {
            document.getElementById("result").innerText = text;
            document.getElementById("tip").innerText = tip;
        }

        // 重置
        function reset() {
            showResult("點按按鈕開始遊戲", "");
        }
    </script>
</body>
</html>
